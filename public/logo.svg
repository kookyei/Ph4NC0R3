<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Neon green outer glow filter -->
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505" rx="64" />

  <!-- Skull Base -->
  <path d="M256 96C176.4 96 112 160.4 112 240v64c0 17.6 14.4 32 32 32h16v48c0 17.6 14.4 32 32 32h128c17.6 0 32-14.4 32-32v-48h16c17.6 0 32-14.4 32-32v-64c0-79.6-64.4-144-144-144z" fill="none" stroke="#00ff41" stroke-width="16" filter="url(#neon-glow)" />

  <!-- Eyes -->
  <path d="M192 256h-48v48h48v-48z" fill="#00ff41" filter="url(#neon-glow)" />
  <path d="M368 256h-48v48h48v-48z" fill="#00ff41" filter="url(#neon-glow)" />

  <!-- Nose -->
  <path d="M256 304l-16 32h32l-16-32z" fill="#00ff41" filter="url(#neon-glow)" />

  <!-- Teeth / Grille -->
  <rect x="208" y="368" width="16" height="32" fill="#00ff41" />
  <rect x="248" y="368" width="16" height="32" fill="#00ff41" />
  <rect x="288" y="368" width="16" height="32" fill="#00ff41" />

  <!-- Cybernetic Lines -->
  <path d="M256 96v-32" stroke="#00ff41" stroke-width="8" />
  <path d="M192 112l-24-24" stroke="#00ff41" stroke-width="8" />
  <path d="M320 112l24-24" stroke="#00ff41" stroke-width="8" />
  
  <path d="M112 240h-32" stroke="#00ff41" stroke-width="8" />
  <path d="M400 240h32" stroke="#00ff41" stroke-width="8" />

  <!-- Glitch Accents -->
  <rect x="150" y="160" width="24" height="8" fill="#00f0ff" opacity="0.8" />
  <rect x="340" y="180" width="32" height="8" fill="#ff003c" opacity="0.8" />
</svg>
